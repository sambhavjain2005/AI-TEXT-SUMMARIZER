<!doctype html> 

<html>


<head>
<title>Counter Project</title>
<link rel="stylesheet" href="counter.css">
</head>

<body>

    <h1> Your Web-Based Counter Is Here ! </h1>

<div class="counter">

<p id="display"></p>


<div class="buttons">
<button id="increase" onclick="currentval=currentval-1; document.querySelector('#display').innerText=currentval;">-</button>
<button id="reset" onclick="currentval=0; document.querySelector('#display').innerText=currentval">↩</button>
<button id="increase" onclick="currentval=currentval+1; document.querySelector('#display').innerText=currentval;">+</button>
</div>

</div>

<script>
    let currentval=0;
    document.querySelector('#display').innerText=currentval;
</script>

</body>


</html>
